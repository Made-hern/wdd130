<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description"
      content="Contact us to book rafting trips or ask questions about our services.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Rafting Adventure</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header>
        <img src="images/logo.avif" alt="Rafting Logo">

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>

        <h1>Contact Us</h1>

        <!-- Company Info -->
        <section class="contact-info">
            <h2>Contact Information</h2>
            <p><strong>Address:</strong> Rio Dulce, Guatemala</p>
            <p><strong>Phone:</strong> +502 4567 8901</p>
            <p><strong>Email:</strong> contact@raftingadventure.com</p>
        </section>

        <!-- Map -->
        <section class="map">
            <h2>Our Location</h2>
            <iframe src="https://www.google.com/maps?q=Rio+Dulce+Guatemala&output=embed"
              loading="lazy">
            </iframe>
        </section>

        <!-- Employees -->
        <section class="employees">
            <h2>Meet Our Team</h2>

            <figure>
                <img src="images/img2.1.jpg" alt="Rafting guide">
                <figcaption>Juan Perez - Lead Guide</figcaption>
            </figure>

            <figure>
                <img src="images/img2.3.jpg" alt="Customer service representative">
                <figcaption>Maria Lopez - Customer Service</figcaption>
            </figure>

            <figure>
                <img src="images/img2.2.jpg" alt="Rafting instructor">
                <figcaption>Carlos Gomez - Instructor</figcaption>
            </figure>
        </section>

        <!-- Form -->
        <section class="contact-form">
            <h2>Send Us a Message</h2>

            <form>

                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <p>Purpose of Message:</p>

                <label>
                    <input type="radio" name="purpose" value="general" required>
                    General Inquiry
                </label>

                <label>
                    <input type="radio" name="purpose" value="reservation">
                    Reservation Question
                </label>

                <label>
                    <input type="radio" name="purpose" value="suggestion">
                    Website Suggestion
                </label>

                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="5" required></textarea>

                <label>
                    <input type="checkbox" name="newsletter">
                    Subscribe me to the monthly newsletter
                </label>

                <button type="submit">Send Message</button>

            </form>
        </section>

    </main>

    <footer>
        <p>© 2026 Rafting Adventure | All rights reserved</p>
    </footer>

</body>

</html>
