<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description"
      content="Contact us to book rafting trips or ask questions about our services.">
    <meta name="author" content="Madelin Hernandez">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact us | Rafting Adventure</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header>
        <img src="images/logo.avif" alt="Rafting Logo">

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>

        <!-- TITLE + COMPANY INFO -->
        <section class="company-info">
            <h1>White Water Rafting Company</h1>
            <p>Rio Dulce, Guatemala</p>
            <p>+502 4567 8901</p>
            <p>contact@raftingadventure.com</p>
        </section>

        <!-- MAIN CONTENT (MAP + FORM) -->
        <section class="contact-grid">

            <!-- MAP -->
            <div class="map">
                <iframe src="https://www.google.com/maps?q=Rio+Dulce+Guatemala&output=embed"
                  loading="lazy">
                </iframe>
            </div>

            <!-- FORM -->
            <div class="contact-form">
                <form action="#" method="post">

                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" placeholder="Your name" required>

                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" placeholder="Your email" required>

                    <p>Message Purpose:</p>

                    <label>
                        <input type="radio" name="purpose" value="general" required>
                        General Inquiry
                    </label>

                    <label>
                        <input type="radio" name="purpose" value="reservation">
                        Reservation Question
                    </label>

                    <label>
                        <input type="radio" name="purpose" value="suggestion">
                        Website Suggestion
                    </label>

                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="5" placeholder="Type here"
                      required></textarea>

                    <label>
                        <input type="checkbox" name="newsletter">
                        Please subscribe me to the monthly newsletter
                    </label>

                    <button type="submit">Get in Touch!</button>

                </form>
            </div>

        </section>

        <!-- EMPLOYEES -->
        <section class="employees">
            <h2>We Are Here to Serve You</h2>

            <figure>
                <img src="images/img2.1.jpg" alt="Rafting guide">
                <figcaption>Juan Perez - Lead Guide</figcaption>
            </figure>

            <figure>
                <img src="images/img2.3.jpg" alt="Customer service representative">
                <figcaption>Maria Lopez - Customer Service</figcaption>
            </figure>

            <figure>
                <img src="images/img2.2.jpg" alt="Rafting instructor">
                <figcaption>Carlos Gomez - Instructor</figcaption>
            </figure>
        </section>

    </main>
    <footer>
        <p>© 2026 White Water Rafting | Madelin Hernandez</p>

        <nav class="socialmedia">
            <a href="#"><img src="images/facebook.png" alt="Facebook"></a>
            <a href="#"><img src="images/instagram.png" alt="Instagram"></a>
            <a href="#"><img src="images/twitter.webp" alt="Twitter"></a>
        </nav>
    </footer>

</body>

</html>
